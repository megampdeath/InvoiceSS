services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      BACKEND_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:3000
      DATABASE_URL: sqlite:////app/invoice_saas.db
      LOCAL_STORAGE_DIR: /app/storage
      REDIS_URL: redis://redis:6379/0
      EXTRACTION_PROVIDER: mock
    volumes:
      - backend-data:/app/storage
      - backend-db:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
    command: sh -c "while true; do python -m app.workers.process_invoice --once; sleep 5; done"
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite:////app/invoice_saas.db
      LOCAL_STORAGE_DIR: /app/storage
      REDIS_URL: redis://redis:6379/0
      EXTRACTION_PROVIDER: mock
    volumes:
      - backend-data:/app/storage
      - backend-db:/app
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
  backend-db:
